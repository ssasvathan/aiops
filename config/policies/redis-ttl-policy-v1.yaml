schema_version: "v1"
ttls_by_env:
  local:
    evidence_window_seconds: 600      # 10 min — fast iteration
    peak_profile_seconds: 3600        # 1 hour
    dedupe_seconds: 300               # 5 min (legacy flat dedupe TTL)
    dedupe_ttl_by_action:             # FR33: AG5 per-action TTLs
      page_seconds: 7200              # 120 min
      ticket_seconds: 14400           # 240 min
      notify_seconds: 3600            # 60 min
  dev:
    evidence_window_seconds: 900      # 15 min
    peak_profile_seconds: 7200        # 2 hours
    dedupe_seconds: 600               # 10 min (legacy flat dedupe TTL)
    dedupe_ttl_by_action:             # FR33: AG5 per-action TTLs
      page_seconds: 7200              # 120 min
      ticket_seconds: 14400           # 240 min
      notify_seconds: 3600            # 60 min
  uat:
    evidence_window_seconds: 1800     # 30 min
    peak_profile_seconds: 14400       # 4 hours
    dedupe_seconds: 900               # 15 min (legacy flat dedupe TTL)
    dedupe_ttl_by_action:             # FR33: AG5 per-action TTLs
      page_seconds: 7200              # 120 min
      ticket_seconds: 14400           # 240 min
      notify_seconds: 3600            # 60 min
  prod:
    evidence_window_seconds: 3600     # 1 hour
    peak_profile_seconds: 86400       # 24 hours
    dedupe_seconds: 1800              # 30 min (legacy flat dedupe TTL)
    dedupe_ttl_by_action:             # FR33: AG5 per-action TTLs
      page_seconds: 7200              # 120 min
      ticket_seconds: 14400           # 240 min
      notify_seconds: 3600            # 60 min

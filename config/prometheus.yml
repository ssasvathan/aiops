global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # aiOps harness metrics — exposed by the traffic generator harness container
  # The harness container will be named 'harness' in docker-compose
  # This job is pre-defined so prometheus.yml is ready when the harness service is added
  - job_name: 'aiops-harness'
    scrape_interval: 5s
    static_configs:
      - targets: ['harness:8000']

  # aiOps pipeline app metrics — exposed by the app container on port 8080
  # Scrape errors are expected until stories 1-2/1-3 add OTLP instruments and metrics endpoint
  - job_name: 'aiops-pipeline'
    scrape_interval: 15s
    static_configs:
      - targets: ['app:8080']

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # aiOps harness metrics — exposed by the traffic generator harness container
  # The harness container will be named 'harness' in docker-compose
  # This job is pre-defined so prometheus.yml is ready when the harness service is added
  - job_name: 'aiops-harness'
    scrape_interval: 5s
    static_configs:
      - targets: ['harness:8000']

  # aiOps pipeline app metrics — app/outbox-publisher/cold-path emit OTLP HTTP
  # to the otel-collector sidecar, which re-exposes the stream as /metrics on :8889.
  # Dotted OTLP names (aiops.findings.total) are translated to underscored Prometheus
  # names (aiops_findings_total) by the collector's Prometheus exporter.
  - job_name: 'aiops-pipeline'
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8889']

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Explicitly whitelist 4-letter commands used by the health check;
      # newer ZooKeeper versions restrict these by default.
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,ruok,mntr"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q 'Mode:'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      # INTERNAL (29092): Docker-network-only, used for broker-to-broker and kafka-init traffic.
      # EXTERNAL (9092): Host-mapped, used by app and external clients; advertised as localhost:9092.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      # Use EXTERNAL listener (9092) — matches KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092.
      # Correct by design; also validates the listener that external clients and app use.
      # start_period=45s gives Kafka extra margin during slow starts (e.g. image builds).
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --topic aiops-case-header \
          --partitions 3 \
          --replication-factor 1 && \
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --topic aiops-triage-excerpt \
          --partitions 3 \
          --replication-factor 1 && \
        echo "Topics created successfully"
    restart: on-failure

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "aiops", "-d", "aiops"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - minio-data:/data

  minio-init:
    # mc client pinned to RELEASE.2025-01-17T23-25-50Z (3 days before server
    # RELEASE.2025-01-20T14-49-07Z) — the 2025-01-20 mc tag does not exist on
    # Docker Hub; this nearest prior release is API-compatible for mb/alias ops.
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin && \
        mc mb --ignore-existing local/aiops-cases && \
        echo "Bucket aiops-cases ready"
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  harness:
    build:
      context: harness
    ports:
      - "8000:8000"
    environment:
      HARNESS_PATTERN: all
      HARNESS_CYCLE_SECONDS: "60"
      HARNESS_INTENSITY: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # app: runs hot-path mode (Dockerfile CMD default) — an infinite scheduler loop.
  # The service should stay running; Exited(0) or a crash indicates a startup failure.
  app:
    build: .
    env_file: config/.env.docker
    # Force a clean harness-local state every compose startup to avoid stale
    # outbox/casefile/cache residue causing false hot-path case errors.
    # Keep the script as a single argv item so `bash -lc` executes the full
    # cleanup+run chain; compose string tokenization would otherwise split it.
    entrypoint:
      - "/bin/bash"
      - "-lc"
      - |
        uv run python -m aiops_triage_pipeline --mode harness-cleanup &&
        exec uv run python -m aiops_triage_pipeline --mode hot-path
    volumes:
      - ./_bmad/input/feed-pack/topology-registry.yaml:/app/config/topology-registry.yaml:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: "no"

  # Dedicated outbox publisher worker:
  # reads READY/RETRY rows from Postgres outbox and publishes Kafka events.
  outbox-publisher:
    build: .
    env_file: config/.env.docker
    command: ["--mode", "outbox-publisher"]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # Dedicated cold-path worker:
  # consumes case-header events and writes diagnosis.json artifacts.
  cold-path:
    build: .
    env_file: config/.env.docker
    command: ["--mode", "cold-path"]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
